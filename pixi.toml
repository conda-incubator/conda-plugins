[workspace]
name = "conda-plugins"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.13"

[feature.render.dependencies]
pygithub = ">=2.4.0"
llm = ">=0.28"

[feature.render.pypi-dependencies]
llm-gguf = ">=0.2"

[feature.render.tasks]
render = { cmd = "python scripts/plugin_list.py", description = "Fetch plugins, categorize, and generate data" }

[feature.docs.dependencies]
sphinx = ">=7.0"
conda-sphinx-theme = ">=0.2"
myst-parser = ">=3.0"
sphinx-design = ">=0.6"
sphinx-copybutton = ">=0.5"
sphinx-sitemap = ">=2.5"

[feature.docs.tasks]
docs = { cmd = "sphinx-build -b dirhtml docs docs/_build/dirhtml", description = "Build documentation" }
docs-serve = { cmd = "python -m http.server", cwd = "docs/_build/dirhtml" }

[environments]
render = { features = ["render"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
